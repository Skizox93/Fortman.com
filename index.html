<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortmanverse</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #0f2027;
      color: white;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Bienvenue dans le Fortmanverse</h1>
  <p>Clique sur le bouton pour tester le JavaScript :</p>
  <button onclick="testJS()">Clique moi</button>

  <p id="test"></p>

  <script>
    function testJS() {
      document.getElementById("test").innerText = "🔥 Le JavaScript fonctionne !";
    }
  </script>

</body>
</html>
